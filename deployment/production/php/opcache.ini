opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; 部署方式為 host bind mount + octane:reload：
; validate_timestamps=0 會讓 git pull 後 reload 仍吃到舊 bytecode（opcache SHM 不會失效），
; 必須重啟整個容器才生效。改為 =1 + revalidate_freq=0（每次 stat 驗證），Octane worker
; 模式下檔案只在 worker 啟動時載入，stat 開銷可忽略，保證 octane:reload 後立即拿到新程式碼。
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.save_comments=1
; PHP 8.4 + Octane 長駐 worker 為 JIT 受益場景
opcache.jit=tracing
opcache.jit_buffer_size=64M
