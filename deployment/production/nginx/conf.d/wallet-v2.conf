upstream wallet_v2_octane {
    server web:8000;
}

# TLS 由 VM 外層 nginx 終結：優先沿用外層傳入的 X-Forwarded-Proto，
# 沒有才 fallback 到本層 $scheme（內部為 http）
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    # TLS 由 VM 上的外層 nginx 終結，此處僅補基礎安全 header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 靜態檔由 nginx 直出（compose 掛載 public/ 至 /var/www/public，唯讀）
    root /var/www/public;

    location ~* \.(ico|css|js|mjs|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|txt)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # location 內用了 add_header 就不會繼承 server 層 header，需重複列出
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://wallet_v2_octane;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
