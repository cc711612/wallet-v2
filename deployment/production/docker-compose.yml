name: ${PROJECT_NAME:-wallet-v2}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  web:
    build:
      context: ../..
      dockerfile: deployment/production/Dockerfile
      provenance: false
    image: ${PROJECT_NAME:-wallet-v2}:app
    container_name: ${PROJECT_NAME:-wallet-v2}-web
    restart: always
    logging: *default-logging
    mem_limit: ${WEB_MEM_LIMIT:-1g}
    environment:
      TZ: ${TZ:-Asia/Taipei}
      CONTAINER_ROLE: web
      APP_BASE_PATH: /var/www/html
    volumes:
      - ${PROJECT_PATH}:/var/www/html
      - ${PROJECT_PATH}/deployment/production/php/opcache.ini:/usr/local/etc/php/conf.d/zz-opcache.ini
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    command: ["/var/www/html/deployment/production/entrypoint-web.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${OCTANE_PORT:-8000}/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    image: ${PROJECT_NAME:-wallet-v2}:app
    container_name: ${PROJECT_NAME:-wallet-v2}-worker
    restart: always
    logging: *default-logging
    mem_limit: ${WORKER_MEM_LIMIT:-1g}
    environment:
      TZ: ${TZ:-Asia/Taipei}
      CONTAINER_ROLE: worker
      APP_BASE_PATH: /var/www/html
    volumes:
      - ${PROJECT_PATH}:/var/www/html
      - ${PROJECT_PATH}/deployment/production/php/opcache.ini:/usr/local/etc/php/conf.d/zz-opcache.ini
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    command: ["/var/www/html/deployment/production/entrypoint-worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl -c /var/www/html/deployment/production/supervisor/supervisord.conf status | grep -qv STOPPED || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME:-wallet-v2}-nginx
    restart: always
    logging: *default-logging
    mem_limit: ${NGINX_MEM_LIMIT:-256m}
    networks:
      - internal
    depends_on:
      web:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${PROJECT_PATH}/public:/var/www/public:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-wallet-v2}-redis
    restart: always
    logging: *default-logging
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - internal
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    name: ${PROJECT_NAME:-wallet-v2}-redis-data

networks:
  internal:
    name: ${PROJECT_NAME:-wallet-v2}-network
