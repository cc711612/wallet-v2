version: '3.9'

services:
  web:
    build:
      context: ../..
      dockerfile: deployment/production/Dockerfile
    image: ${PROJECT_NAME:-wallet-v2}:app
    container_name: ${PROJECT_NAME:-wallet-v2}-web
    restart: always
    environment:
      TZ: ${TZ:-Asia/Taipei}
      CONTAINER_ROLE: web
    volumes:
      - ${PROJECT_PATH}:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
    command: ["/entrypoint-web.sh"]
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${PROJECT_NAME:-wallet-v2}:app
    container_name: ${PROJECT_NAME:-wallet-v2}-worker
    restart: always
    environment:
      TZ: ${TZ:-Asia/Taipei}
      CONTAINER_ROLE: worker
    volumes:
      - ${PROJECT_PATH}:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    command: ["/entrypoint-worker.sh"]

  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME:-wallet-v2}-nginx
    restart: always
    depends_on:
      web:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-wallet-v2}-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
